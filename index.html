  function doPost(e) {

    const data = JSON.parse(e.postData.contents);
    sheet.appendRow([
      new Date(),
      data.action,
      data.detail,
      data.language,
      data.referrer,
      data.userAgent
    ]);
    return ContentService.createTextOutput(
      JSON.stringify({ status: "ok" })
    ).setMimeType(ContentService.MimeType.JSON);
  }
